<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Panel (Static) - RFE</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Inline theme toggle script to prevent FOUC (Flash of Unstyled Content)
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script type="module" src="main.js" defer></script>
    <style>
        input, textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); font-family: var(--font-mono); }
        .admin-item { border: 1px solid var(--border-color); padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="glass">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" style="font-size: 1.1rem; font-weight: 900; border: none; display: flex; align-items: center; gap: 0.5rem;">
                    <span class="mono" style="color: var(--primary-color)">[RFE]</span>
                    <span>Rattenfleischexperten</span>
                </a>
            </div>
            <nav class="mono">
                <a href="protocols.html">Protokolle</a>
                <a href="council.html">Der Rat</a>
                <a href="manifesto.html">Manifest</a>
                <button id="theme-toggle" style="padding: 0.2rem 0.4rem; font-size: 0.8rem; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color);">TAG</button>
            </nav>
        </div>
    </header>

    <div class="ratometer-global-container">
        <div class="ratometer-fill" data-state="default"></div>
        <span class="mono" style="position: absolute; left: 1rem; font-size: 0.7rem; opacity: 0.4; pointer-events: none;">RAT_INTENSITY_INDEX</span>
        <span class="mono" style="position: absolute; left: 500px; font-size: 1.2rem; color: var(--secondary-color); pointer-events: none;">Das krasse Geheimnis des Ratcliffs ist:   Verarscht du HS!</span>
    </div>

    <div id="login-screen" class="container" style="padding: 10rem 0; text-align: center;">
        <h2 class="mono">ADMIN LOGIN</h2>
        <input type="password" id="password" placeholder="Passwort" style="max-width: 300px; margin: 2rem auto; display: block;">
        <button id="login-btn" class="mono">EINTRETEN</button>
    </div>

    <div id="admin-panel" class="container" style="display: none; padding: 4rem 0;">
        <h2 class="mono" style="margin-bottom: 2rem;">PROTOKOLL MANAGEMENT (SUPABASE)</h2>
        <div class="card" style="margin-bottom: 3rem;">
            <h3 class="mono">NEUES LOKAL HINZUFÜGEN</h3>
            <div style="display: grid; grid-template-columns: 1fr 100px; gap: 1rem;">
                <input type="text" id="new-lokal" placeholder="Name des Lokals">
                <input type="number" id="new-cost" placeholder="Kosten CHF" step="0.5">
            </div>
            <input type="text" id="new-maps" placeholder="Google Maps Embed URL (src)">
            <div style="display: flex; gap: 1rem;">
                <input type="number" id="new-essen" placeholder="Essen (0-5)" min="0" max="5">
                <input type="number" id="new-service" placeholder="Service (0-5)" min="0" max="5">
                <input type="number" id="new-ambiente" placeholder="Ambiente (0-5)" min="0" max="5">
            </div>
            <textarea id="new-notitz" placeholder="Notitz" rows=""></textarea>
            <button id="add-btn" class="mono">HINZUFÜGEN</button>
        </div>
        <div id="edit-list"></div>
    </div>

    <script>
        // --- KONFIGURATION (Muss gleich sein wie in main.js) ---
        const SUPABASE_URL = 'https://lezkdohngzxvuszcwcuj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KPIUCuONZw1laeyPpT4e_g_cwf06Fcb';
        const ADMIN_HASH = 'd72acedf10dcfba58c0f6018067affc36e341bb33c2dcce56cf516df4507ae20'; // SHA-256 for 'ratte'
        // ------------------------------------------------------

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        let reviews = [];

        document.getElementById('login-btn').addEventListener('click', async () => {
            const input = document.getElementById('password').value;
            const hashedInput = await sha256(input);

            if (hashedInput === ADMIN_HASH) {
                window.adminLoggedIn = true;
                window.updateRatometer();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadAdminReviews();
            } else {
                alert('Falsches Passwort!');
            }
        });

        async function loadAdminReviews() {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?select=*&order=id.desc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            reviews = await res.json();
            renderAdminList();
        }

        function renderAdminList() {
            const container = document.getElementById('edit-list');
            container.innerHTML = '<h3 class="mono">EXISTIERENDE EINTRÄGE</h3>';
            reviews.forEach((r, index) => {
                const item = document.createElement('div');
                item.className = 'admin-item';
                item.innerHTML = `
                    <p class="mono subtle">ID: ${r.id}</p>
                    <div style="display: grid; grid-template-columns: 1fr 100px; gap: 1rem;">
                        <input type="text" value="${r.lokal}" id="edit-lokal-${r.id}">
                        <input type="number" value="${r.cost || 0}" id="edit-cost-${r.id}" step="0.5">
                    </div>
                    <input type="text" value="${r.maps_url || ''}" id="edit-maps-${r.id}" placeholder="Google Maps Embed URL">
                    <div style="display: flex; gap: 1rem;">
                        <input type="number" value="${r.essen}" id="edit-essen-${r.id}">
                        <input type="number" value="${r.service}" id="edit-service-${r.id}">
                        <input type="number" value="${r.ambiente}" id="edit-ambiente-${r.id}">
                    </div>
                    <textarea id="edit-notitz-${r.id}" rows="10">${r.notitz}</textarea>
                    <div style="display: flex; justify-content: space-between;">
                        <button onclick="updateReview(${r.id})" class="mono" style="background: var(--primary-color); color: white;">UPDATE</button>
                        <button onclick="deleteReview(${r.id})" class="mono" style="background: #e74c3c; color: white;">LÖSCHEN</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        async function updateReview(id) {
            const updatedData = {
                lokal: document.getElementById(`edit-lokal-${id}`).value,
                cost: parseFloat(document.getElementById(`edit-cost-${id}`).value),
                maps_url: document.getElementById(`edit-maps-${id}`).value,
                essen: parseInt(document.getElementById(`edit-essen-${id}`).value),
                service: parseInt(document.getElementById(`edit-service-${id}`).value),
                ambiente: parseInt(document.getElementById(`edit-ambiente-${id}`).value),
                notitz: document.getElementById(`edit-notitz-${id}`).value
            };
            await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedData)
            });
            alert('Aktualisiert!');
            loadAdminReviews();
        }

        async function deleteReview(id) {
            if (confirm('Löschen?')) {
                await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                loadAdminReviews();
            }
        }

        document.getElementById('add-btn').addEventListener('click', async () => {
            const newEntry = {
                lokal: document.getElementById('new-lokal').value,
                cost: parseFloat(document.getElementById('new-cost').value) || 0,
                maps_url: document.getElementById('new-maps').value,
                essen: parseInt(document.getElementById('new-essen').value) || 0,
                service: parseInt(document.getElementById('new-service').value) || 0,
                ambiente: parseInt(document.getElementById('new-ambiente').value) || 0,
                notitz: document.getElementById('new-notitz').value || '(leer)'
            };
            await fetch(`${SUPABASE_URL}/rest/v1/reviews`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(newEntry)
            });
            alert('Hinzugefügt!');
            loadAdminReviews();
        });
    </script>

                <a href="mailto:rattenfleisch69@gmail.com">EMAIL</a>

</body>
